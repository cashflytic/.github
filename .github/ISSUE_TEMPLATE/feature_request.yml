name: Feature Request
description: Propose a new feature or improvement for cashflytic
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please provide as much context as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What user need or pain point does it address?
      placeholder: As a user, I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: domain_area
    attributes:
      label: Domain Area
      description: Which architectural layer does this primarily affect?
      options:
        - domain
        - application
        - infrastructure
        - api
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know when this feature is done? List concrete, testable conditions.
      placeholder: |
        - Given ... when ... then ...
        - The endpoint returns ...
        - Coverage remains ≥ 98%
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false
